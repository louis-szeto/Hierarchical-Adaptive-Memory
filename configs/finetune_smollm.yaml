# Stage-C fine-tuning cost-to-target experiment -- REAL MODEL, PROOF OF CONCEPT.
#
# NEW DESIGN (per-leg training with HAM injected into ham leg's training):
#
# Two legs are trained INDEPENDENTLY from the IDENTICAL baseline model:
# - weights_only  -> SFT on no-context prompts (Question -> Answer)
# - ham_augmented -> SFT on context-augmented prompts (Context + Question -> Answer)
#
# Both legs start from the same frozen checkpoint (step 0 invariant enforced), each
# has its own optimizer/trajectory, and each is evaluated with its matching prompt
# mode. The headline metric is cost-to-target per leg (optimizer steps / training
# tokens / wall-clock to reach a common accuracy threshold T) plus the ham/weights
# ratio.
#
# A small, GPU-feasible real pretrained model (SmolLM2-135M-Instruct) is
# actually fine-tuned (SFT) on the synthetic fact corpus in checkpoints; at each
# checkpoint each leg is evaluated with its matching prompt mode.
# Headline: training tokens / wall-clock / optimizer-steps to reach the target
# accuracy, and the ham/weights ratio. This demonstrates the harness end to end
# on a real model -- it is explicitly NOT publication evidence.
#
# Requires torch + transformers:
#   pip install -e ".[hf]"
#   ham finetune        --config configs/finetune_smollm.yaml --out results/finetune_smollm
#   ham finetune-report --run-dir results/finetune_smollm     --out results/finetune_smollm/artifacts
#
# Because backend.kind == hf and finetune.trainer == hf, outputs are NOT
# watermarked SMOKE TEST; base_weights_changed is truthfully true.
name: finetune_smollm
seed: 0
notes: "REAL MODEL, PROOF OF CONCEPT -- SmolLM2-135M fine-tuned on synthetic facts; not publication evidence."

conditions:
  - weights_only
  - ham_augmented

stage:
  target_stage: C_finetuning
  base_weights_changed: true         # truthful: the hf trainer updates the weights
  persistent_across_sessions: true
  integration_mode: external_context
  trainable_router: false

backend:
  kind: hf
  model_id: HuggingFaceTB/SmolLM2-135M-Instruct
  device: cpu                       # CPU: the shared display GPU OOM'd/crashed under the eval loop; CPU is slower but safe and deterministic.
  dtype: float32
  quantization: null
  max_new_tokens: 4                 # answers are short; kept small to bound per-checkpoint eval cost on CPU
  temperature: 0.0
  seed: 0

embedding:
  kind: hash
  dim: 128
  normalize: true
  seed: 0

compression:
  text_codec: auto
  vector_quant: int8
  allocation: ham

memory:
  working_capacity: 6
  retrieval_k: 5
  token_budget: 256
  chunk_max_chars: 300
  consolidation_enabled: true
  consolidation_radius: 0.25
  retrieval: cosine

dataset:
  name: synthetic
  num_examples: 20                  # ~20 distinct facts: enough that memorization is gradual across checkpoints (the cost-to-target gap only appears when memorization is non-trivial), few enough that a 135M model reaches a high ceiling within 100 steps
  num_sessions: 5
  facts_per_session: 4
  distractors_per_session: 2
  seed: 0

eval:
  kind: string

stats:
  bootstrap_resamples: 2000
  permutation_resamples: 2000
  ci: 0.95
  seed: 0

finetune:
  trainer: hf
  optimizer: adamw
  learning_rate: 1e-4               # the LR at which an 8-fact corpus saturated in ~20 steps; with 20 facts memorization is gradual over many checkpoints
  batch_size: 8
  max_steps: 100                    # 20 facts need room to memorize; fine checkpoints resolve the cost-to-target gap
  checkpoint_every: 5               # fine resolution so the step at which each arm first hits the target is locatable
  target_accuracy: null              # null => parity: peak accuracy the weights_only leg actually achieves, minus delta (always reachable by weights by construction)
  parity_with: weights_only
  noninferiority_delta: 0.03
