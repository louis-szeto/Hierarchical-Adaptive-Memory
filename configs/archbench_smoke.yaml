# Stage-F toy architecture memory-block experiment -- SMOKE (mock trainer).
#
# Uses the deterministic MockArchTrainer (no torch): synthetic quality/bytes/latency
# curves whose HAM advantage scales with redundancy. Outputs are flagged is_smoke=true
# and watermarked SMOKE TEST -- plumbing/CI checks, NOT scientific results.
#
#   ham archbench        --config configs/archbench_smoke.yaml --out results/archbench_smoke
#   ham archbench-report --run-dir results/archbench_smoke     --out results/archbench_smoke/artifacts
name: archbench_smoke
seed: 0
notes: "SMOKE TEST -- mock archbench trainer synthetic curves; not scientific results."

stage:
  target_stage: F_architecture_level
  base_weights_changed: false        # truthful: the mock trainer trains nothing
  persistent_across_sessions: true
  integration_mode: hidden_state_fusion
  trainable_router: true

stats:
  bootstrap_resamples: 2000
  permutation_resamples: 2000
  ci: 0.95
  seed: 0

archbench:
  trainer: mock
  task: recall
  regime: pretrain
  conditions: [no_memory, standard_memory, ham_memory, ham_uniform, ham_no_consolidation, ham_random_alloc]
  redundancy_levels: [0.0, 0.5, 0.9]   # the lever: 0=uniform, ->1=highly redundant
  # toy model
  dim: 64
  n_layers: 2
  vocab: 256
  n_heads: 4
  memory_layer: 0
  top_k: 4
  capacity: 512
  consolidation_radius: 0.25
  semantic_bits: 4
  # training
  optimizer: adamw
  learning_rate: 1.0e-3
  batch_size: 16
  max_steps: 200
  checkpoint_every: 20
  # corpus
  seq_len: 64
  n_train_streams: 256
  n_eval_streams: 64
  target_quality: 0.9
  device: cpu
