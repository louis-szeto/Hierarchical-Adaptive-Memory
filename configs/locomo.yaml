# LoCoMo publication-oriented config.
#
# Data: clone https://github.com/snap-research/locomo and set dataset.path to its
# data/locomo10.json (10 conversations). If the file is absent the adapter FAILS
# LOUDLY with guidance -- no data is fabricated.
name: locomo10
seed: 0
conditions:
  - memory_off
  - full_history
  - uncompressed_rag
  - recency_fifo
  - static_prototype
  - uniform_quantization
  - ham_memory
  - random_tiering
  - no_consolidation
  - lexical_retrieval

stage:
  target_stage: E_inference_external_memory
  base_weights_changed: false
  persistent_across_sessions: true
  integration_mode: external_context
  trainable_router: false

backend:
  kind: hf
  model_id: Qwen/Qwen3-1.7B
  device: cpu
  dtype: bfloat16
  quantization: null
  max_new_tokens: 64
  temperature: 0.0

embedding:
  kind: sentence-transformers
  model_id: BAAI/bge-small-en-v1.5
  normalize: true

compression:
  text_codec: zstd
  vector_quant: int8
  allocation: ham

memory:
  working_capacity: 8
  retrieval_k: 8
  token_budget: 1024
  chunk_max_chars: 400
  consolidation_enabled: true
  consolidation_radius: 0.22
  retrieval: cosine

dataset:
  name: locomo
  path: data/locomo10.json   # snap-research/locomo @ 3eb6f2c (see Appendix provenance)
  sample_limit: null
  seed: 0

eval:
  kind: string

stats:
  bootstrap_resamples: 10000
  permutation_resamples: 10000
  ci: 0.95
  noninferiority_delta: 0.03
  seed: 0
