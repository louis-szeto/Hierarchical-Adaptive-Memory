# Publication-scale config: a 7B/8B instruct model loaded in 4-bit so it fits on
# a single workstation GPU. This is NOT used by tests and NEVER auto-downloaded
# in CI; it is instantiated only when you run it explicitly.
name: longmemeval_s_7b
seed: 0
conditions:
  - memory_off
  - full_history
  - uncompressed_rag
  - recency_fifo
  - static_prototype
  - uniform_quantization
  - ham_memory
  - random_tiering

stage:
  target_stage: E_inference_external_memory
  base_weights_changed: false
  persistent_across_sessions: true
  integration_mode: external_context
  trainable_router: false

backend:
  kind: hf
  model_id: Qwen/Qwen2.5-7B-Instruct       # or meta-llama/Llama-3.1-8B-Instruct
  device: auto
  dtype: bfloat16
  quantization: 4bit                        # requires the [quant] extra (bitsandbytes)
  max_new_tokens: 64
  temperature: 0.0

embedding:
  kind: sentence-transformers
  model_id: BAAI/bge-small-en-v1.5
  normalize: true

compression:
  text_codec: zstd
  vector_quant: int8
  allocation: ham

memory:
  working_capacity: 8
  retrieval_k: 8
  token_budget: 1536
  chunk_max_chars: 500
  consolidation_enabled: true
  consolidation_radius: 0.22
  retrieval: faiss                          # requires the [faiss] extra

dataset:
  name: longmemeval
  path: null
  hf_file: longmemeval_s.json
  sample_limit: 500
  seed: 0

eval:
  kind: string

stats:
  bootstrap_resamples: 10000
  permutation_resamples: 10000
  ci: 0.95
  noninferiority_delta: 0.03
  seed: 0
