# Larger deterministic synthetic multi-session fact-recall run (still mock backend,
# still a SMOKE run because no real model is used). Useful for exercising the full
# condition + ablation matrix and the statistics at a non-trivial sample size.
name: synthetic_full
seed: 0
conditions:
  - memory_off
  - full_history
  - uncompressed_rag
  - recency_fifo
  - static_prototype
  - uniform_quantization
  - ham_memory
  - random_tiering
  - no_consolidation
  - no_recency
  - no_novelty
  - no_reuse
  - lexical_retrieval

stage:
  target_stage: E_inference_external_memory
  base_weights_changed: false
  persistent_across_sessions: true
  integration_mode: external_context
  trainable_router: false

backend:
  kind: mock
  model_id: mock-1
  max_new_tokens: 32
  temperature: 0.0

embedding:
  kind: hash
  dim: 384
  normalize: true

compression:
  text_codec: auto
  vector_quant: int8
  allocation: ham

memory:
  working_capacity: 8
  retrieval_k: 6
  token_budget: 512
  chunk_max_chars: 300
  consolidation_enabled: true
  consolidation_radius: 0.25
  retrieval: cosine

dataset:
  name: synthetic
  num_examples: 100
  num_sessions: 8
  facts_per_session: 4
  distractors_per_session: 4
  sample_limit: null
  seed: 0

eval:
  kind: string

stats:
  bootstrap_resamples: 10000
  permutation_resamples: 10000
  ci: 0.95
  noninferiority_delta: 0.03
  seed: 0
