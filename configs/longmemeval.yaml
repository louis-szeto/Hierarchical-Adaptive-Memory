# LongMemEval publication-oriented config.
#
# Data: download longmemeval_oracle.json (cheap, evidence-only) or
# longmemeval_s.json from https://github.com/xiaowu0162/LongMemEval or the HF
# mirror xiaowu0162/longmemeval-cleaned, then set dataset.path below. If path is
# null the adapter attempts an HF-hub download and otherwise FAILS LOUDLY with
# guidance (no data is fabricated).
#
# Model: a small CPU/GPU-feasible instruct model by default. Swap backend.model_id
# for a 7B/8B model (and enable quantization) for the full publication run. Large
# models are NEVER auto-downloaded by tests -- only by an explicit run.
name: longmemeval_s
seed: 0
conditions:
  - memory_off
  - full_history
  - uncompressed_rag
  - recency_fifo
  - static_prototype
  - uniform_quantization
  - ham_memory
  - random_tiering
  - no_consolidation
  - lexical_retrieval

stage:
  target_stage: E_inference_external_memory
  base_weights_changed: false
  persistent_across_sessions: true
  integration_mode: external_context
  trainable_router: false

backend:
  kind: hf
  model_id: Qwen/Qwen2.5-1.5B-Instruct   # publication small; also try Llama-3.2-1B-Instruct
  device: auto
  dtype: bfloat16
  quantization: null                      # set "4bit" for 7B/8B on one workstation
  max_new_tokens: 64
  temperature: 0.0

embedding:
  kind: sentence-transformers
  model_id: BAAI/bge-small-en-v1.5
  normalize: true
  matryoshka_dim: null                    # e.g. 128 for variable-rate embeddings

compression:
  text_codec: zstd
  vector_quant: int8
  allocation: ham

memory:
  working_capacity: 8
  retrieval_k: 8
  token_budget: 1024
  chunk_max_chars: 500
  consolidation_enabled: true
  consolidation_radius: 0.22
  retrieval: cosine                        # set "faiss" with the [faiss] extra

dataset:
  name: longmemeval
  path: null                               # e.g. data/longmemeval_oracle.json
  hf_repo: xiaowu0162/longmemeval-cleaned
  hf_file: longmemeval_oracle.json
  sample_limit: 100                        # null => all 500 questions
  seed: 0

eval:
  kind: string                             # set "llm_judge" to use an LLM judge (needs API/model)

stats:
  bootstrap_resamples: 10000
  permutation_resamples: 10000
  ci: 0.95
  noninferiority_delta: 0.03
  seed: 0
